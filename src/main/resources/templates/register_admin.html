<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Registration | EduTrack Pro</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* Exact styles from your Admin Login page */
        body { 
            background: #f8f9fa; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 400px; 
            border-top: 6px solid #1a73e8; 
        }
        .brand { 
            font-size: 1.8rem; 
            font-weight: bold; 
            color: #1a73e8; 
            text-align: center; 
            margin-bottom: 10px; 
        }
        .subtitle { 
            text-align: center; 
            color: #5f6368; 
            font-size: 0.9rem; 
            margin-bottom: 30px; 
        }
        .input-group { 
            margin-bottom: 20px; 
        }
        .input-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #3c4043; 
        }
        .input-group input { 
            width: 100%; 
            padding: 12px; 
            border: 1.5px solid #dadce0; 
            border-radius: 8px; 
            outline: none; 
            transition: 0.3s; 
            box-sizing: border-box; 
        }
        .input-group input:focus { 
            border-color: #1a73e8; 
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1); 
        }
        .login-btn { 
            width: 100%; 
            padding: 14px; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .login-btn:hover { 
            background: #1557b0; 
        }
        .alert-error { 
            background: #fce8e6; 
            color: #d93025; 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            font-size: 0.85rem; 
            text-align: center; 
            border: 1px solid #f1998e; 
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand">EduTrack</div>
        <div class="subtitle">Create New Administrator Account</div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/saveAdmin}" th:object="${user}" method="post">
            <div class="input-group">
                <label>Email / Username</label>
                <input type="email" th:field="*{username}" placeholder="admin@college.com" required autofocus>
            </div>
            <div class="input-group">
                <label>Create Password</label>
                <input type="password" th:field="*{password}" placeholder="••••••••" required>
            </div>
            <div class="input-group">
                <label>Invitation Code</label>
                <input type="text" name="inviteCode" placeholder="Enter Secret Code" required>
            </div>
            <button type="submit" class="login-btn">Register Admin</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #5f6368;">
    Already have an account? 
    <a th:href="@{/admin/login}" style="color: #1a73e8; text-decoration: none; font-weight: bold;">Sign In</a>
</p>
    </div>

</body>
</html>
