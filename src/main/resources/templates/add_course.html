<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Define New Course | EduTrack</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .form-wrapper { display: flex; justify-content: center; align-items: center; padding: 60px 20px; }
        
        .registration-card {
            background: #ffffff;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 550px;
            border-top: 6px solid #34a853; /* Green for Courses */
        }

        .form-header { margin-bottom: 2.5rem; }
        .form-header h2 { color: #34a853; font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
        .form-header p { color: #5f6368; font-size: 0.9rem; }

        .input-group { margin-bottom: 1.8rem; }
        .input-group label { display: block; margin-bottom: 10px; color: #3c4043; font-weight: 600; font-size: 0.95rem; }
        
        /* Applied same styling to inputs, selects, and textareas */
        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #dadce0;
            border-radius: 8px;
            font-size: 1rem;
            color: #202124;
            background-color: #f8f9fa;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            font-family: inherit;
            resize: vertical;
        }

        .input-group input:focus, .input-group textarea:focus { 
            border-color: #34a853; 
            box-shadow: 0 0 0 4px rgba(52, 168, 83, 0.1); 
            background-color: #ffffff;
        }

        .save-btn {
            width: 100%;
            padding: 16px;
            background: #34a853;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .save-btn:hover { background: #2d8a44; transform: translateY(-1px); }

        .back-link { display: inline-flex; align-items: center; margin-bottom: 25px; text-decoration: none; color: #5f6368; font-weight: 500; }
        .back-link:hover { color: #34a853; }
        
        .text-muted { color: #70757a; font-size: 0.85rem; margin-top: 8px; display: block; }
    </style>
</head>
<body>

    <header class="main-header">
        <div style="font-size: 1.5rem; font-weight: bold; color: #1a73e8;">EduTrack</div>
        <nav>
            <ul class="nav-menu">
                <li><a th:href="@{/admin/home}">Home</a></li>
                <li><a th:href="@{/admin/dashboard}">Management</a></li>
                <li><a th:href="@{/admin/courses}">Courses</a></li>
                <li><a href="/">Logout</a></li>
            </ul>
        </nav>
    </header>

    <div class="form-wrapper">
        <div class="registration-card">
            
            <a th:href="@{/admin/courses}" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Courses
            </a>

            <div class="form-header">
                <h2>New Course Definition</h2>
                <p>Add a new academic program to the EduTrack system.</p>
            </div>

            <form th:action="@{/admin/saveCourse}" th:object="${course}" method="POST">
                
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{adminEmail}">

                <div class="input-group">
                    <label>Course Name</label>
                    <input type="text" th:field="*{courseName}" placeholder="e.g. B.Sc Data Science" required>
                </div>

                <div class="input-group">
                    <label>Short Code</label>
                    <input type="text" th:field="*{courseCode}" placeholder="e.g. BSDS" required>
                </div>

                <div class="input-group">
                    <label>Department</label>
                    <input type="text" th:field="*{department}" placeholder="e.g. IT or Science" required>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div class="input-group" style="flex: 1;">
                        <label>Duration</label>
                        <input type="text" th:field="*{duration}" placeholder="e.g. 3 Years" required>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Total Intake</label>
                        <input type="number" th:field="*{intake}" placeholder="e.g. 60" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Course Modules / Syllabus</label>
                    <textarea th:field="*{courseSyllabus}" 
                              rows="4" 
                              placeholder="e.g. Java Programming, Data Structures, Operating Systems"></textarea>
                    <small class="text-muted">Separate subjects with commas for a cleaner look on the student dashboard.</small>
                </div>

                <div style="margin-top: 2rem;">
                    <button type="submit" class="save-btn">Create Course</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
