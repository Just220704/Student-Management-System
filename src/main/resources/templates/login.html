<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | EduTrack Pro</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body { 
            background-color: var(--dark); 
            background-image: radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #fff;
        }

        .login-card { 
            background: var(--card-bg); 
            padding: 45px; 
            border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%; 
            max-width: 400px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
        }

        .brand { 
            font-size: 2rem; 
            font-weight: 800; 
            color: #fff; 
            text-align: center; 
            margin-bottom: 10px; 
            letter-spacing: -1px;
        }
        .brand span { color: var(--primary); }

        .subtitle { 
            text-align: center; 
            color: #94a3b8; 
            font-size: 1rem; 
            margin-bottom: 35px; 
        }

        .input-group { margin-bottom: 25px; }

        .input-group label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: 700; 
            color: #94a3b8; 
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input { 
            width: 100%; 
            padding: 14px 18px; 
            background-color: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            border-radius: 12px; 
            outline: none; 
            transition: 0.3s; 
            box-sizing: border-box; 
            color: #fff !important;
            font-family: inherit;
        }

        .input-group input:focus { 
            border-color: var(--primary) !important; 
            background-color: rgba(15, 23, 42, 0.9) !important;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); 
        }

        .login-btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px;
        }

        .login-btn:hover { 
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .alert { 
            padding: 14px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            font-size: 0.9rem; 
            text-align: center; 
            font-weight: 600;
        }

        .alert-error { 
            background: rgba(248, 113, 113, 0.1); 
            color: #f87171; 
            border: 1px solid rgba(248, 113, 113, 0.2); 
        }

        .alert-logout { 
            background: rgba(34, 197, 94, 0.1); 
            color: #4ade80; 
            border: 1px solid rgba(34, 197, 94, 0.2); 
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand">edu<span>track.</span>pro</div>
        <div class="subtitle">Secure Administrator Management Portal</div>

        <div th:if="${param.error}" class="alert alert-error">
            Invalid administrator credentials.
        </div>

        <div th:if="${param.logout}" class="alert alert-logout">
            You have been logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="input-group">
                <label>Admin Email</label>
                <input type="text" name="username" placeholder="admin@edutrack.pro" required autofocus>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Sign In to Dashboard</button>
        </form>

        <a href="/" class="back-link">← Return to Landing Page</a>
    </div>

</body>
</html>
