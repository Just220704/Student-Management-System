<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Management | EduTrack Pro</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        
        /* Course Grid Layout */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .course-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 6px solid #34a853; /* Green Theme */
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .course-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }

        .dept-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
            color: #34a853;
            background: #e6f4ea;
            padding: 5px 12px;
            border-radius: 20px;
            width: fit-content;
        }

        .course-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #202124;
            margin: 15px 0 5px 0;
        }

        .course-code {
            font-family: 'Courier New', monospace;
            color: #5f6368;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: block;
        }

        .course-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #3c4043;
        }

        .stat-item { display: flex; align-items: center; gap: 5px; }

        .card-actions {
            border-top: 1px solid #f1f1f1;
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
        }

        /* Course Search Styling */
        .course-search-wrapper {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1.5px solid #dadce0;
            outline: none;
        }

        .search-box:focus { border-color: #34a853; box-shadow: 0 0 0 4px rgba(52, 168, 83, 0.1); }
        
        .header-content { margin: 30px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <header class="main-header">
        <div style="font-size: 1.5rem; font-weight: bold; color: #1a73e8;">EduTrack</div>
        <nav>
            <ul class="nav-menu">
                <li><a th:href="@{/admin/home}">Home</a></li>
                <li><a th:href="@{/admin/dashboard}">Management</a></li>
                <li><a th:href="@{/admin/courses}">Courses</a></li>
                <li><a th:href="@{/}">Logout</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="header-content">
            <div>
                <h1 style="color: #202124;">Course Control Dashboard</h1>
                <p style="color: #5f6368;">Design, update, and manage academic programs.</p>
            </div>
            <a th:href="@{/admin/showNewCourseForm}" class="login-btn" style="text-decoration:none; width: auto; padding: 0.8rem 1.5rem; background: #34a853; border-radius: 8px;">+ Add New Course</a>
        </div>

        <div th:if="${error}" style="background: #fce8e6; color: #d93025; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #f1998e; font-size: 0.95rem; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(217, 48, 37, 0.05);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 12px;">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
            <strong style="margin-right: 5px;">Action Blocked:</strong> <span th:text="${error}">Error Message</span>
        </div>
        <div class="course-search-wrapper">
            <input type="text" id="courseFilter" class="search-box" placeholder="Filter by course name or code...">
        </div>

        <div class="course-grid" id="courseGrid">
            
            <div class="course-card" th:each="course : ${listCourses}">
                <div>
                    <span class="dept-badge" th:text="${course.department}">Department</span>
                    <h2 class="course-title" th:text="${course.courseName}">Course Name</h2>
                    <span class="course-code" th:text="${'Code: ' + course.courseCode}">CODE101</span>
                </div>

                <div>
                    <div class="course-stats" th:with="taken=${seatCounts.get(course.courseCode)}, total=${course.intake}">
                        <div class="stat-item">⏱ <span th:text="${course.duration}">3 Years</span></div>
                        
                        <div class="stat-item">
                            <span th:style="${taken >= total} ? 'color: #d93025; font-weight: bold;' : 'color: #34a853;'">
                                👥 <span th:text="${taken + '/' + total + ' Seats'}">0/60 Seats</span>
                            </span>
                            <span th:if="${taken >= total}" 
                                  style="background: #fce8e6; color: #d93025; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-left: 5px;">
                                FULL
                            </span>
                        </div>
                    </div>

                    <div class="card-actions">
                        <a th:href="@{/admin/showFormForCourseUpdate/{id}(id=${course.id})}" class="btn-action update-btn" style="color:#34a853; background:#e6f4ea;">Edit Details</a>
                        <a th:href="@{/admin/deleteCourse/{id}(id=${course.id})}" onclick="return confirm('Archive this course?')" class="btn-action delete-btn">Archive</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Live Filter for Course Cards
        document.getElementById('courseFilter').addEventListener('keyup', function() {
            let val = this.value.toLowerCase();
            let cards = document.querySelectorAll('.course-card');
            
            cards.forEach(card => {
                let title = card.querySelector('.course-title').textContent.toLowerCase();
                let code = card.querySelector('.course-code').textContent.toLowerCase();
                if(title.includes(val) || code.includes(val)) {
                    card.style.display = "flex";
                } else {
                    card.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
